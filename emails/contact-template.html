<html>
  <body style="margin:0; padding:0; background:#ffffff; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#ffffff; padding:20px 0;">
      <tr>
        <td align="center">
          <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:10px; overflow:hidden; border:1px solid #f2f2f2;">
            
            <!-- Header -->
            <tr>
              <td style="background:#ff7a00; padding:20px; text-align:center;">
                <h1 style="color:#ffffff; margin:0; font-size:24px;">📩 New Contact Form Message</h1>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding:25px;">
                
                <p style="font-size:16px; color:#333;">
                  <strong style="color:#ff7a00;">Name:</strong> 
                  {{firstName}} {{lastName}}
                </p>

                <p style="font-size:16px; color:#333;">
                  <strong style="color:#ff7a00;">Email:</strong> 
                  {{email}}
                </p>

                <p style="font-size:16px; color:#333; margin-bottom:8px;">
                  <strong style="color:#ff7a00;">Message:</strong>
                </p>

                <div style="background:#fff7ef; border-left:4px solid #ff7a00; padding:15px; border-radius:6px; color:#333; font-size:15px; line-height:1.5;">
                  {{message}}
                </div>

              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="background:#fafafa; padding:15px; text-align:center; font-size:12px; color:#777;">
                This email was sent from your website contact form.
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
